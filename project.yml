name: JCDE
options:
  bundleIdPrefix: com.jcde
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: AJ3GSWSC4K
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.0.0

targets:
  JCDE:
    type: application
    platform: iOS
    bundleId: com.jcde
    deploymentTarget: "17.0"
    sources:
      - path: Sources/JCDE
    resources:
      - path: Assets.xcassets
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jcde
        DEVELOPMENT_TEAM: AJ3GSWSC4K
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Sources/JCDE/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/JCDE/Info.plist
      properties:
        CFBundleName: JCDE
        CFBundleDisplayName: Joe's CC Dev
        CFBundleIdentifier: com.jcde
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleIconName: AppIcon
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - Icon-60
              - Icon-76
              - Icon-120
              - Icon-152
              - Icon-167
              - Icon-180
            CFBundleIconName: AppIcon
        CFBundleIcons~ipad:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - Icon-76
              - Icon-152
              - Icon-167
            CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
