workflows:
  ios-release:
    name: JCDE iOS Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.jcde
        XCODE_SCHEME: JCDE
        APP_NAME: "Joe's CC Dev"
        PRIVATE_KEY_B64: ""
        CERT_KEY_B64: ""
    scripts:
      - name: Install XcodeGen
        script: |
          set -ex
          brew install xcodegen

      - name: Set build version
        script: |
          set -ex
          BUILD_VER=$((BUILD_NUMBER + 100))
          MARKETING_VER="1.${BUILD_VER}.0"
          sed -i.bak "s|CURRENT_PROJECT_VERSION: \"[^\"]*\"|CURRENT_PROJECT_VERSION: \"${BUILD_VER}\"|" project.yml
          sed -i.bak "s|MARKETING_VERSION: \"[^\"]*\"|MARKETING_VERSION: \"${MARKETING_VER}\"|" project.yml

      - name: Create app in App Store Connect if needed
        script: |
          set -ex
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$PRIVATE_KEY_B64" | base64 -d)
          app-store-connect apps create \
            --bundle-id-identifier "$BUNDLE_ID" \
            --name "$APP_NAME" \
            --primary-locale EN_US \
            --sku JCDE001 \
            2>&1 || echo "App may already exist, continuing..."

      - name: Generate Xcode project
        script: |
          set -ex
          xcodegen generate

      - name: Set up code signing
        script: |
          set -ex
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$PRIVATE_KEY_B64" | base64 -d)
          export CERTIFICATE_PRIVATE_KEY=$(echo "$CERT_KEY_B64" | base64 -d)
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          set -ex
          xcodebuild -downloadComponent MetalToolchain || true
          xcode-project build-ipa \
            --project JCDE.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-configuration Release DEVELOPMENT_TEAM=AJ3GSWSC4K"

      - name: Upload to TestFlight
        script: |
          set -ex
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "=== Assets.car present? ==="
          unzip -l "$IPA" | grep -i "assets.car" || echo "NO Assets.car found"
          echo "=== All IPA contents ==="
          unzip -l "$IPA" | grep -i "icon\|\.png\|assets" | head -30
          echo "=== Assets.car icon entries ==="
          unzip -p "$IPA" "*.app/Assets.car" > /tmp/Assets.car 2>/dev/null && assetutil --info /tmp/Assets.car | grep -i "name\|icon\|size" | head -30 || echo "Could not inspect Assets.car"
          echo "=== Info.plist CFBundleIcon ==="
          unzip -p "$IPA" "*.app/Info.plist" | plutil -p - | grep -i "icon" | head -20
          export APP_STORE_CONNECT_PRIVATE_KEY=$(echo "$PRIVATE_KEY_B64" | base64 -d)
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa" | head -1) \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - joeharvey333@gmail.com
